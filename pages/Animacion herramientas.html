<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bunker Metal</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: black;
    width:100vw; height:100vh;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }

  .scene { position:relative; width:520px; height:520px; }

  /* ── RADIAL GLOW ── */
  .scene::before {
    content:'';
    position:absolute; inset:-100px;
    background: radial-gradient(circle at 50% 50%,
      rgba(231,160,33,0.10) 0%,
      rgba(231,160,33,0.04) 35%,
      transparent 65%);
    animation: breathe 4s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes breathe {
    0%,100%{opacity:.8;} 50%{opacity:1;}
  }

  /* ── SVG FILLS ── */
  svg { overflow:visible; }

  /* rings */
  .ring-a { animation: spinCW  35s linear infinite; transform-origin:260px 260px; }
  .ring-b { animation: spinCCW 50s linear infinite; transform-origin:260px 260px; }
  .ring-c { animation: spinCW  70s linear infinite; transform-origin:260px 260px; }
  .ring-radar { animation: spinCW 6s linear infinite; transform-origin:260px 260px; }

  @keyframes spinCW  { to{transform:rotate(360deg);}  }
  @keyframes spinCCW { to{transform:rotate(-360deg);} }

  /* center hex pulse */
  .hex-glow { animation: hexPulse 2.6s ease-in-out infinite; transform-origin:260px 260px; }
  @keyframes hexPulse {
    0%,100%{ filter:drop-shadow(0 0 8px rgba(231,160,33,.5));  }
    50%    { filter:drop-shadow(0 0 22px rgba(231,160,33,.95)); }
  }

  /* center icon rock */
  .center-icon { animation: rock 3s ease-in-out infinite; transform-origin:260px 260px; }
  @keyframes rock {
    0%,100%{transform:rotate(-8deg);} 50%{transform:rotate(8deg);}
  }

  /* pulse rings */
  .pulse1 { animation: pulseOut 3.6s ease-out infinite;       transform-origin:260px 260px; }
  .pulse2 { animation: pulseOut 3.6s ease-out infinite 1.2s;  transform-origin:260px 260px; }
  .pulse3 { animation: pulseOut 3.6s ease-out infinite 2.4s;  transform-origin:260px 260px; }
  @keyframes pulseOut {
    0%  { transform:scale(1);   opacity:.45; }
    100%{ transform:scale(6.5); opacity:0;   }
  }

  /* tool orbit arms — each arm rotates, bubble counter-rotates */
  /* RING A (r=82) */
  .armA1 { animation: spinCW  9s linear infinite;           transform-origin:260px 260px; }
  .armA2 { animation: spinCW  9s linear infinite -4.5s;     transform-origin:260px 260px; }
  .nodeA1{ animation: spinCCW 9s linear infinite;           transform-origin:260px 178px; }
  .nodeA2{ animation: spinCCW 9s linear infinite -4.5s;     transform-origin:260px 178px; }

  /* RING B (r=152) */
  .armB1 { animation: spinCCW 16s linear infinite;          transform-origin:260px 260px; }
  .armB2 { animation: spinCCW 16s linear infinite -4s;      transform-origin:260px 260px; }
  .armB3 { animation: spinCCW 16s linear infinite -8s;      transform-origin:260px 260px; }
  .armB4 { animation: spinCCW 16s linear infinite -12s;     transform-origin:260px 260px; }
  .nodeB1{ animation: spinCW  16s linear infinite;          transform-origin:260px 108px; }
  .nodeB2{ animation: spinCW  16s linear infinite -4s;      transform-origin:260px 108px; }
  .nodeB3{ animation: spinCW  16s linear infinite -8s;      transform-origin:260px 108px; }
  .nodeB4{ animation: spinCW  16s linear infinite -12s;     transform-origin:260px 108px; }

  /* RING C (r=220) */
  .armC1 { animation: spinCW  26s linear infinite;          transform-origin:260px 260px; }
  .armC2 { animation: spinCW  26s linear infinite -4.33s;   transform-origin:260px 260px; }
  .armC3 { animation: spinCW  26s linear infinite -8.67s;   transform-origin:260px 260px; }
  .armC4 { animation: spinCW  26s linear infinite -13s;     transform-origin:260px 260px; }
  .armC5 { animation: spinCW  26s linear infinite -17.33s;  transform-origin:260px 260px; }
  .armC6 { animation: spinCW  26s linear infinite -21.67s;  transform-origin:260px 260px; }
  .nodeC1{ animation: spinCCW 26s linear infinite;          transform-origin:260px 40px;  }
  .nodeC2{ animation: spinCCW 26s linear infinite -4.33s;   transform-origin:260px 40px;  }
  .nodeC3{ animation: spinCCW 26s linear infinite -8.67s;   transform-origin:260px 40px;  }
  .nodeC4{ animation: spinCCW 26s linear infinite -13s;     transform-origin:260px 40px;  }
  .nodeC5{ animation: spinCCW 26s linear infinite -17.33s;  transform-origin:260px 40px;  }
  .nodeC6{ animation: spinCCW 26s linear infinite -21.67s;  transform-origin:260px 40px;  }

  /* sparks */
  .sp { animation: spk var(--d,2.8s) ease-out infinite var(--dl,0s); opacity:0; transform-origin:260px 260px; }
  @keyframes spk {
    0%  { opacity:0; transform:translate(0,0) scale(1.4); }
    8%  { opacity:1; }
    100%{ opacity:0; transform:translate(var(--tx),var(--ty)) scale(0); }
  }
</style>
</head>
<body>
<div class="scene">
<svg width="520" height="520" viewBox="0 0 520 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- tool circle clip -->
    <clipPath id="ca1"><circle cx="260" cy="178" r="22"/></clipPath>
    <clipPath id="ca2"><circle cx="260" cy="178" r="22"/></clipPath>
    <clipPath id="cb1"><circle cx="260" cy="108" r="26"/></clipPath>
    <clipPath id="cb2"><circle cx="260" cy="108" r="26"/></clipPath>
    <clipPath id="cb3"><circle cx="260" cy="108" r="26"/></clipPath>
    <clipPath id="cb4"><circle cx="260" cy="108" r="26"/></clipPath>
    <clipPath id="cc1"><circle cx="260" cy="40"  r="28"/></clipPath>
    <clipPath id="cc2"><circle cx="260" cy="40"  r="28"/></clipPath>
    <clipPath id="cc3"><circle cx="260" cy="40"  r="28"/></clipPath>
    <clipPath id="cc4"><circle cx="260" cy="40"  r="28"/></clipPath>
    <clipPath id="cc5"><circle cx="260" cy="40"  r="28"/></clipPath>
    <clipPath id="cc6"><circle cx="260" cy="40"  r="28"/></clipPath>

    <!-- radial gradient for ring lines -->
    <radialGradient id="lineGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#E7A021" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E7A021" stop-opacity="0"/>
    </radialGradient>

    <!-- center glow gradient -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#E7A021" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#E7A021" stop-opacity="0"/>
    </radialGradient>

    <!-- node gradient -->
    <radialGradient id="nodeBg" cx="50%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#141414"/>
    </radialGradient>

    <!-- hex gradient -->
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F0B030"/>
      <stop offset="100%" stop-color="#C07010"/>
    </linearGradient>

    <!-- icon color -->
    <style>
      .ic { fill:none; stroke:#E7A021; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
      .icf { fill:#E7A021; }
      .ics { fill:none; stroke:#E7A021; stroke-width:1.6; stroke-linecap:round; }
    </style>
  </defs>

  <!-- ═══ AMBIENT GLOW CIRCLE ═══ -->
  <circle cx="260" cy="260" r="240" fill="url(#centerGlow)"/>

  <!-- ═══ GRID DOTS ═══ -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#E7A021"/>
    </pattern>
    <circle cx="260" cy="260" r="240" fill="url(#dots)"/>
  </g>

  <!-- ═══ PULSE RINGS ═══ -->
  <circle class="pulse1" cx="260" cy="260" r="36" fill="none" stroke="#E7A021" stroke-width="1" opacity="0"/>
  <circle class="pulse2" cx="260" cy="260" r="36" fill="none" stroke="#E7A021" stroke-width="1" opacity="0"/>
  <circle class="pulse3" cx="260" cy="260" r="36" fill="none" stroke="#E7A021" stroke-width="1" opacity="0"/>

  <!-- ═══ RING A — dashed, r=82 ═══ -->
  <g class="ring-a">
    <circle cx="260" cy="260" r="82"
      fill="none" stroke="#E7A021" stroke-width="1"
      stroke-dasharray="4 8" opacity="0.35"/>
    <!-- tick marks -->
    <line x1="260" y1="178" x2="260" y2="172" stroke="#E7A021" stroke-width="1.5" opacity="0.6"/>
    <line x1="260" y1="342" x2="260" y2="348" stroke="#E7A021" stroke-width="1.5" opacity="0.6"/>
    <line x1="178" y1="260" x2="172" y2="260" stroke="#E7A021" stroke-width="1.5" opacity="0.6"/>
    <line x1="342" y1="260" x2="348" y2="260" stroke="#E7A021" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- ═══ RING B — dashed, r=152 ═══ -->
  <g class="ring-b">
    <circle cx="260" cy="260" r="152"
      fill="none" stroke="#E7A021" stroke-width="1"
      stroke-dasharray="5 10" opacity="0.28"/>
    <line x1="260" y1="108" x2="260" y2="100" stroke="#E7A021" stroke-width="1.5" opacity="0.5"/>
    <line x1="260" y1="412" x2="260" y2="420" stroke="#E7A021" stroke-width="1.5" opacity="0.5"/>
    <line x1="108" y1="260" x2="100" y2="260" stroke="#E7A021" stroke-width="1.5" opacity="0.5"/>
    <line x1="412" y1="260" x2="420" y2="260" stroke="#E7A021" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- ═══ RING C — dashed, r=220 ═══ -->
  <g class="ring-c">
    <circle cx="260" cy="260" r="220"
      fill="none" stroke="#E7A021" stroke-width="1"
      stroke-dasharray="6 12" opacity="0.20"/>
    <line x1="260" y1="40"  x2="260" y2="30"  stroke="#E7A021" stroke-width="1.5" opacity="0.4"/>
    <line x1="260" y1="480" x2="260" y2="490" stroke="#E7A021" stroke-width="1.5" opacity="0.4"/>
    <line x1="40"  y1="260" x2="30"  y2="260" stroke="#E7A021" stroke-width="1.5" opacity="0.4"/>
    <line x1="480" y1="260" x2="490" y2="260" stroke="#E7A021" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- ═══ RADAR SWEEP ═══ -->
  <g class="ring-radar">
    <path d="M260,260 L260,178 A82,82 0 0,1 319,219 Z"
      fill="url(#centerGlow)" opacity="0.5"/>
  </g>

  <!-- ═══ CONNECTOR LINES (arm to center) ═══ -->
  <!-- These are thin lines from center to each node position, rendered behind nodes -->
  <!-- Ring A arms -->
  <g class="armA1" opacity="0.25">
    <line x1="260" y1="260" x2="260" y2="178" stroke="url(#lineGrad)" stroke-width="1"/>
  </g>
  <g class="armA2" opacity="0.25">
    <line x1="260" y1="260" x2="260" y2="178" stroke="url(#lineGrad)" stroke-width="1"/>
  </g>
  <!-- Ring B arms -->
  <g class="armB1" opacity="0.2">
    <line x1="260" y1="260" x2="260" y2="108" stroke="url(#lineGrad)" stroke-width="1"/>
  </g>
  <g class="armB2" opacity="0.2">
    <line x1="260" y1="260" x2="260" y2="108" stroke="url(#lineGrad)" stroke-width="1"/>
  </g>
  <g class="armB3" opacity="0.2">
    <line x1="260" y1="260" x2="260" y2="108" stroke="url(#lineGrad)" stroke-width="1"/>
  </g>
  <g class="armB4" opacity="0.2">
    <line x1="260" y1="260" x2="260" y2="108" stroke="url(#lineGrad)" stroke-width="1"/>
  </g>
  <!-- Ring C arms -->
  <g class="armC1" opacity="0.15">
    <line x1="260" y1="260" x2="260" y2="40" stroke="url(#lineGrad)" stroke-width="1"/>
  </g>
  <g class="armC2" opacity="0.15">
    <line x1="260" y1="260" x2="260" y2="40" stroke="url(#lineGrad)" stroke-width="1"/>
  </g>
  <g class="armC3" opacity="0.15">
    <line x1="260" y1="260" x2="260" y2="40" stroke="url(#lineGrad)" stroke-width="1"/>
  </g>
  <g class="armC4" opacity="0.15">
    <line x1="260" y1="260" x2="260" y2="40" stroke="url(#lineGrad)" stroke-width="1"/>
  </g>
  <g class="armC5" opacity="0.15">
    <line x1="260" y1="260" x2="260" y2="40" stroke="url(#lineGrad)" stroke-width="1"/>
  </g>
  <g class="armC6" opacity="0.15">
    <line x1="260" y1="260" x2="260" y2="40" stroke="url(#lineGrad)" stroke-width="1"/>
  </g>

  <!-- ═══ RING A NODES (r=82, bubble r=22) ═══ -->

  <!-- NODE A1 — Wrench -->
  <g class="armA1">
    <g class="nodeA1">
      <circle cx="260" cy="178" r="22" fill="url(#nodeBg)" stroke="#E7A021" stroke-width="1.5" opacity="1"/>
      <circle cx="260" cy="178" r="22" fill="none" stroke="#E7A021" stroke-width="0.5" opacity="0.3" stroke-dasharray="2 4"/>
      <!-- wrench icon -->
      <g transform="translate(248,166)">
        <path class="ic" d="M18,2 C18,2 20,6 18,9 C16,12 13,12 13,12 L4,21 C3,22 2,22 2,21 L1,20 C0,19 0,18 1,17 L10,8 C10,8 10,5 13,3 C16,1 18,2 18,2 Z"/>
        <circle class="icf" cx="3.5" cy="20.5" r="1.5"/>
      </g>
    </g>
  </g>

  <!-- NODE A2 — Bolt/Nut -->
  <g class="armA2">
    <g class="nodeA2">
      <circle cx="260" cy="178" r="22" fill="url(#nodeBg)" stroke="#E7A021" stroke-width="1.5"/>
      <circle cx="260" cy="178" r="22" fill="none" stroke="#E7A021" stroke-width="0.5" opacity="0.3" stroke-dasharray="2 4"/>
      <!-- nut/bolt icon -->
      <g transform="translate(249,167)">
        <polygon class="ic" points="11,1 20,6 20,16 11,21 2,16 2,6"/>
        <circle class="ic" cx="11" cy="11" r="4"/>
      </g>
    </g>
  </g>

  <!-- ═══ RING B NODES (r=152, bubble r=26) ═══ -->

  <!-- NODE B1 — Hammer -->
  <g class="armB1">
    <g class="nodeB1">
      <circle cx="260" cy="108" r="26" fill="url(#nodeBg)" stroke="#E7A021" stroke-width="1.5"/>
      <circle cx="260" cy="108" r="26" fill="none" stroke="#E7A021" stroke-width="0.5" opacity="0.3" stroke-dasharray="2 4"/>
      <g transform="translate(247,95)">
        <path class="ic" d="M15,2 L20,7 L13,14 L8,9 Z"/>
        <rect class="ic" x="11" y="7" width="4" height="3" rx="1" transform="rotate(-45 13 8.5)"/>
        <line class="ics" x1="8" y1="14" x2="2" y2="20"/>
        <line class="ics" x1="10" y1="12" x2="4" y2="18"/>
      </g>
    </g>
  </g>

  <!-- NODE B2 — Gear -->
  <g class="armB2">
    <g class="nodeB2">
      <circle cx="260" cy="108" r="26" fill="url(#nodeBg)" stroke="#E7A021" stroke-width="1.5"/>
      <circle cx="260" cy="108" r="26" fill="none" stroke="#E7A021" stroke-width="0.5" opacity="0.3" stroke-dasharray="2 4"/>
      <g transform="translate(249,97)">
        <path class="ic" d="M9,1 L12,1 L12.5,3.5 C13.5,3.8 14.4,4.3 15.2,5 L17.5,4 L19.5,6 L18.5,8.3 C19.2,9.1 19.7,10 20,11 L22.5,11.5 L22.5,14.5 L20,15 C19.7,16 19.2,16.9 18.5,17.7 L19.5,20 L17.5,22 L15.2,21 C14.4,21.7 13.5,22.2 12.5,22.5 L12,25 L9,25 L8.5,22.5 C7.5,22.2 6.6,21.7 5.8,21 L3.5,22 L1.5,20 L2.5,17.7 C1.8,16.9 1.3,16 1,15 L-1.5,14.5 L-1.5,11.5 L1,11 C1.3,10 1.8,9.1 2.5,8.3 L1.5,6 L3.5,4 L5.8,5 C6.6,4.3 7.5,3.8 8.5,3.5 Z"/>
        <circle class="ic" cx="10.5" cy="13" r="4.5"/>
      </g>
    </g>
  </g>

  <!-- NODE B3 — Screwdriver -->
  <g class="armB3">
    <g class="nodeB3">
      <circle cx="260" cy="108" r="26" fill="url(#nodeBg)" stroke="#E7A021" stroke-width="1.5"/>
      <circle cx="260" cy="108" r="26" fill="none" stroke="#E7A021" stroke-width="0.5" opacity="0.3" stroke-dasharray="2 4"/>
      <g transform="translate(249,96)">
        <path class="ic" d="M17,2 C18.5,0.5 21,0.5 22,1.5 C23,2.5 23,5 21.5,6.5 L18,10 L14,6 Z"/>
        <line class="ics" x1="14" y1="6" x2="2" y2="18"/>
        <path class="ic" d="M2,18 L1,22 L5,21 Z"/>
        <line class="ics" x1="15.5" y1="4.5" x2="13" y2="7"/>
      </g>
    </g>
  </g>

  <!-- NODE B4 — Pliers -->
  <g class="armB4">
    <g class="nodeB4">
      <circle cx="260" cy="108" r="26" fill="url(#nodeBg)" stroke="#E7A021" stroke-width="1.5"/>
      <circle cx="260" cy="108" r="26" fill="none" stroke="#E7A021" stroke-width="0.5" opacity="0.3" stroke-dasharray="2 4"/>
      <g transform="translate(249,97)">
        <path class="ic" d="M3,3 C3,3 5,1 8,3 L13,8 L8,13 L3,8 C1,5 3,3 3,3 Z"/>
        <path class="ic" d="M19,3 C19,3 21,5 19,8 L14,13 L9,8 L14,3 C17,1 19,3 19,3 Z"/>
        <line class="ics" x1="8"  y1="13" x2="3"  y2="22"/>
        <line class="ics" x1="14" y1="13" x2="19" y2="22"/>
        <circle class="icf" cx="11" cy="10" r="2"/>
      </g>
    </g>
  </g>

  <!-- ═══ RING C NODES (r=220, bubble r=28) ═══ -->

  <!-- NODE C1 — Saw -->
  <g class="armC1">
    <g class="nodeC1">
      <circle cx="260" cy="40" r="28" fill="url(#nodeBg)" stroke="#E7A021" stroke-width="1.5"/>
      <circle cx="260" cy="40" r="28" fill="none" stroke="#E7A021" stroke-width="0.5" opacity="0.3" stroke-dasharray="2 4"/>
      <g transform="translate(248,28)">
        <path class="ic" d="M2,20 L10,4 C11,2 13,2 14,4 L22,20"/>
        <path class="ic" d="M5,14 L19,14"/>
        <path class="ic" d="M3,17 C3,17 6,15 8,17 C10,19 12,17 12,17 C12,17 14,15 16,17 C18,19 21,17 21,17"/>
      </g>
    </g>
  </g>

  <!-- NODE C2 — Drill -->
  <g class="armC2">
    <g class="nodeC2">
      <circle cx="260" cy="40" r="28" fill="url(#nodeBg)" stroke="#E7A021" stroke-width="1.5"/>
      <circle cx="260" cy="40" r="28" fill="none" stroke="#E7A021" stroke-width="0.5" opacity="0.3" stroke-dasharray="2 4"/>
      <g transform="translate(248,28)">
        <rect class="ic" x="1"  y="8"  width="12" height="8"  rx="2"/>
        <rect class="ic" x="13" y="10" width="6"  height="4"  rx="1"/>
        <line class="ics" x1="19" y1="12" x2="24" y2="12"/>
        <path class="ic" d="M24,9 L24,15 L27,12 Z"/>
        <line class="ics" x1="4"  y1="16" x2="4"  y2="20"/>
        <line class="ics" x1="8"  y1="16" x2="8"  y2="20"/>
        <rect class="icf" x="3" y="10" width="2" height="4" rx="0.5" opacity="0.5"/>
      </g>
    </g>
  </g>

  <!-- NODE C3 — Ruler/Square -->
  <g class="armC3">
    <g class="nodeC3">
      <circle cx="260" cy="40" r="28" fill="url(#nodeBg)" stroke="#E7A021" stroke-width="1.5"/>
      <circle cx="260" cy="40" r="28" fill="none" stroke="#E7A021" stroke-width="0.5" opacity="0.3" stroke-dasharray="2 4"/>
      <g transform="translate(248,28)">
        <path class="ic" d="M3,3 L3,21 L21,21"/>
        <path class="ic" d="M3,21 L18,6"/>
        <line class="ics" x1="3"  y1="17" x2="6"  y2="17"/>
        <line class="ics" x1="3"  y1="13" x2="6"  y2="13"/>
        <line class="ics" x1="3"  y1="9"  x2="6"  y2="9"/>
        <line class="ics" x1="7"  y1="21" x2="7"  y2="18"/>
        <line class="ics" x1="11" y1="21" x2="11" y2="18"/>
        <line class="ics" x1="15" y1="21" x2="15" y2="18"/>
      </g>
    </g>
  </g>

  <!-- NODE C4 — Welder/Torch -->
  <g class="armC4">
    <g class="nodeC4">
      <circle cx="260" cy="40" r="28" fill="url(#nodeBg)" stroke="#E7A021" stroke-width="1.5"/>
      <circle cx="260" cy="40" r="28" fill="none" stroke="#E7A021" stroke-width="0.5" opacity="0.3" stroke-dasharray="2 4"/>
      <g transform="translate(248,28)">
        <path class="ic" d="M3,20 L14,9 C15,8 17,8 18,9 L19,10 C20,11 20,13 19,14 L8,20 Z"/>
        <line class="ics" x1="19" y1="10" x2="22" y2="7"/>
        <path class="ic"  d="M21,4 C23,5 24,7 22,8" fill="none"/>
        <circle class="icf" cx="22" cy="5"  r="1.2" opacity="0.8"/>
        <circle class="icf" cx="24" cy="4"  r="0.8" opacity="0.6"/>
        <circle class="icf" cx="21" cy="3"  r="0.8" opacity="0.5"/>
        <line class="ics" x1="4" y1="18" x2="7" y2="21"/>
        <line class="ics" x1="7" y1="15" x2="10" y2="18"/>
      </g>
    </g>
