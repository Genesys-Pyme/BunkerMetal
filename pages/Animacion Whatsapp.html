<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bunker Metal - Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --steel: #1a1a1a;
    --rust: #E7A021;
    --spark: #E7A021;
    --wa-green: #25D366;
    --wa-dark: #353535;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Barlow', sans-serif;
    overflow: hidden;
  }
  .phone {
    width: 320px;
    background: #111;
    border-radius: 36px;
    border: 3px solid #333;
    box-shadow: 0 0 0 6px #1e1e1e, 0 30px 80px rgba(0,0,0,0.8);
    overflow: hidden;
  }
  .notch {
    height: 28px;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .notch-bar { width: 120px; height: 10px; background: #222; border-radius: 10px; }
  .wa-header {
    background: var(--wa-dark);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: 58px;
  }
  .wa-avatar {
    width: 38px; height: 38px;
    background: var(--rust);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .wa-contact-info { flex: 1; min-width: 0; }
  .wa-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px; color: white; letter-spacing: 1px;
  }
  .wa-status { font-size: 11px; color: rgba(255,255,255,0.7); }
  .wa-icons { display: flex; gap: 14px; color: white; font-size: 18px; flex-shrink: 0; }
  .chat-area {
    background: #0d1117;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    height: 390px;
    padding: 12px 10px;
    display: flex; flex-direction: column; gap: 6px;
    overflow: hidden;
  }
  .date-divider {
    text-align: center; font-size: 10px; color: #666;
    background: rgba(255,255,255,0.05);
    padding: 3px 10px; border-radius: 8px;
    align-self: center; margin-bottom: 2px;
  }
  .bubble {
    max-width: 82%; padding: 8px 12px; border-radius: 12px;
    font-size: 12px; line-height: 1.5;
    position: relative; opacity: 0;
  }
  .bubble.sent {
    background: #1e3a2e;
    border: 1px solid rgba(37,211,102,0.15);
    align-self: flex-end;
    border-bottom-right-radius: 3px;
    color: #e8e8e8;
  }
  .bubble.received {
    background: #1e1e1e;
    border: 1px solid rgba(255,255,255,0.07);
    align-self: flex-start;
    border-bottom-left-radius: 3px;
    color: #e8e8e8;
  }
  .meta { display: flex; justify-content: flex-end; align-items: center; gap: 4px; margin-top: 3px; }
  .time { font-size: 9px; color: #555; }
  .tick { font-size: 10px; color: var(--wa-green); }
  .typing-indicator {
    background: #1e1e1e;
    border: 1px solid rgba(255,255,255,0.07);
    align-self: flex-start;
    border-radius: 12px; border-bottom-left-radius: 3px;
    padding: 10px 14px;
    display: flex; gap: 5px; opacity: 0;
  }
  .typing-dot {
    width: 7px; height: 7px; background: #555;
    border-radius: 50%; animation: typingBounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  .price-card {
    background: linear-gradient(135deg, #1a1a1a, #111);
    border: 1px solid rgba(231,160,33,0.35);
    border-left: 3px solid var(--rust);
    border-radius: 8px; padding: 10px; margin-bottom: 4px;
  }
  .price-card .product-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px; color: var(--spark);
    letter-spacing: 1px; margin-bottom: 5px;
  }
  .price-line {
    display: flex; justify-content: space-between;
    font-size: 10px; color: #bbb; padding: 2px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .price-line .val { color: white; font-weight: 700; }
  .price-total {
    display: flex; justify-content: space-between;
    margin-top: 6px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px; color: white; letter-spacing: 1px;
  }
  .price-total .amount { color: var(--wa-green); }
  .wa-input-bar {
    background: #111; padding: 8px 10px;
    display: flex; align-items: center; gap: 10px;
    border-top: 1px solid #1e1e1e;
  }
  .wa-input-field {
    flex: 1; background: #1e1e1e;
    border: 1px solid #2a2a2a; border-radius: 20px;
    padding: 8px 14px; font-size: 12px; color: #555;
    font-family: 'Barlow', sans-serif;
  }
  .wa-send-btn {
    width: 36px; height: 36px; background: var(--wa-green);
    border-radius: 50%; display: flex;
    align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  @keyframes typingBounce {
    0%,60%,100% { transform: translateY(0); background: #555; }
    30% { transform: translateY(-4px); background: #999; }
  }
  @keyframes popIn {
    0%   { opacity: 0; transform: scale(0.8) translateY(8px); }
    65%  { opacity: 1; transform: scale(1.03) translateY(-2px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes sparkAnim {
    0%   { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
  }
</style>
</head>
<body>
<div class="phone">
  <div class="notch"><div class="notch-bar"></div></div>
  <div class="wa-header">
    <div class="wa-avatar">🔧</div>
    <div class="wa-contact-info">
      <div class="wa-name">BUNKER METAL</div>
      <div class="wa-status" id="wa-status">en línea</div>
    </div>
    <div class="wa-icons">
      <span>📞</span>
      <span style="font-size:22px;font-weight:bold;">⋮</span>
    </div>
  </div>
  <div class="chat-area" id="chat">
    <div class="date-divider">HOY</div>
  </div>
  <div class="wa-input-bar">
    <div class="wa-input-field">Escribí tu mensaje...</div>
    <div class="wa-send-btn">➤</div>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const waStatus = document.getElementById('wa-status');

const SEQUENCE = [
  { type:'sent',     text:'Hola! ¿Me pueden hacer un presupuesto\npara una puerta metálica 0,90 × 2,00m?', time:'10:23', delay:900 },
  { type:'typing',   delay:1700 },
  { type:'received', text:'¡Hola! Claro que sí 💪\n¿La querés con marco o solo la hoja?', time:'10:24', delay:3400 },
  { type:'sent',     text:'Con marco y cerradura incluida si se puede 👍', time:'10:24', delay:4600 },
  { type:'typing',   delay:5400 },
  { type:'price',    time:'10:26', delay:7200 },
  { type:'received', text:'¡Hacemos envío e instalación! 🔩\n¿Te queda bien para coordinar?', time:'10:26', delay:8500 },
  { type:'sent',     text:'Perfecto! Me interesa, los llamo 🙌', time:'10:27', delay:9700 },
];

const LOOP_MS = 13500;
let typingEl = null;
let tids = [];

function later(fn, ms) { tids.push(setTimeout(fn, ms)); }

function show(el) { el.style.animation = 'popIn 0.38s ease forwards'; }

function lines(text) {
  return text.split('\n').map((l,i) => i===0 ? l : '<br>'+l).join('');
}

function addMsg(msg) {
  later(() => {
    if (typingEl && msg.type !== 'typing') {
      const dead = typingEl; typingEl = null;
      dead.style.transition = 'opacity 0.18s';
      dead.style.opacity = '0';
      setTimeout(() => dead.remove(), 200);
      waStatus.textContent = 'en línea';
    }

    let el;
    if (msg.type === 'typing') {
      el = document.createElement('div');
      el.className = 'typing-indicator';
      el.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
      chat.appendChild(el); show(el);
      typingEl = el;
      waStatus.textContent = 'escribiendo...';

    } else if (msg.type === 'sent') {
      el = document.createElement('div');
      el.className = 'bubble sent';
      el.innerHTML = `${lines(msg.text)}<div class="meta"><span class="time">${msg.time}</span><span class="tick">✓✓</span></div>`;
      chat.appendChild(el); show(el);

    } else if (msg.type === 'received') {
      el = document.createElement('div');
      el.className = 'bubble received';
      el.innerHTML = `${lines(msg.text)}<div class="meta"><span class="time">${msg.time}</span></div>`;
      chat.appendChild(el); show(el);

    } else if (msg.type === 'price') {
      el = document.createElement('div');
      el.className = 'bubble received';
      el.style.padding = '8px';
      el.innerHTML = `
        <div class="price-card">
          <div class="product-name">🚪 PUERTA METÁLICA 0.90×2.00m</div>
          <div class="price-line"><span>Hoja de chapa doblada</span><span class="val">✓ incluida</span></div>
          <div class="price-line"><span>Marco galvanizado</span><span class="val">✓ incluido</span></div>
          <div class="price-line"><span>Cerradura triple punto</span><span class="val">✓ incluida</span></div>
          <div class="price-line"><span>Pintura anticorrosiva</span><span class="val">✓ incluida</span></div>
          <div class="price-total"><span>TOTAL</span><span class="amount">$ 185.000</span></div>
        </div>
        <div class="meta"><span class="time">${msg.time}</span></div>`;
      chat.appendChild(el); show(el);
      spawnSparks();
    }

    chat.scrollTop = chat.scrollHeight;
  }, msg.delay);
}

function spawnSparks() {
  const r = document.querySelector('.phone').getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height*0.56;
  for (let i=0; i<7; i++) {
    const s = document.createElement('div');
    const tx = ((Math.random()-0.5)*90)+'px';
    const ty = -(Math.random()*70+15)+'px';
    s.style.cssText = `position:fixed;width:5px;height:5px;background:#E7A021;border-radius:50%;
      left:${cx+(Math.random()-0.5)*50}px;top:${cy}px;z-index:9999;pointer-events:none;
      --tx:${tx};--ty:${ty};animation:sparkAnim ${0.5+Math.random()*0.5}s ease forwards;`;
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 1100);
  }
}

function runLoop() {
  tids.forEach(clearTimeout); tids=[];
  chat.innerHTML = '<div class="date-divider">HOY</div>';
  typingEl = null;
  waStatus.textContent = 'en línea';
  SEQUENCE.forEach(addMsg);
  later(runLoop, LOOP_MS);
}

runLoop();
</script>
</body>
</html>
